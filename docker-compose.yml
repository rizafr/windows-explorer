services:
  postgres:
    image: postgres:16-alpine
    container_name: windows_explorer_database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-explorer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-explorer_pass}
      POSTGRES_DB: ${POSTGRES_DB:-windows_explorer}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-explorer} -d ${POSTGRES_DB:-windows_explorer}" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
